irector, Gabriel Voinea, has committed to providing financing for the Company to maintain its listing requirements. There is no formal agreement between the company and Mr, Voinea. Funds forwarded by Mr. Voinea are interest free and have no fixed repayment date.\nOur financial statements from inception (October 10, 2025) through to December 31, 2025, report that we have has realized revenues of $8,940.00 to date with a gross profit of $5,380.00 and a net income of $1,690.00. Our independent registered public accounting firm, Michael Gillespie & Associates, PLLC, has issued an audit opinion for RWB Health, Inc., which includes a statement expressing a substantial doubt as to our ability to continue as a going concern.\nAs of the date of this prospectus, there is no public trading market for our common stock and no assurance that a trading market for our securities will ever develop. The company is publicly offering its shares to raise funds in order for our business to develop its operations and increase its likelihood of commercial success.\n4\nTable of Contents\nWe are an “emerging growth company” within the meaning of the federal securities laws. For as long as we are an emerging growth company, we will not be required to comply with the requirements that are applicable to other public companies that are not “emerging growth companies” including, but not limited to, not being required to comply with the auditor attestation requirements of Section 404 of the Sarbanes-Oxley Act, the reduced disclosure obligations regarding executive compensation in our periodic reports and proxy statements and the exemptions from the requirements of holding a nonbinding advisory vote on executive compensation and shareholder approval of any golden parachute payments not previously approved. We intend to take advantage of these reporting exemptions until we are no longer an emerging growth company.\nFor a description of the qualifications and other requirements applicable to emerging growth companies and certain elections that we have made due to our status as an emerging growth company, see “RISKS RELATING TO OUR COMMON STOCK”\nWE ARE AN “EMERGING GROWTH COMPANY” AND WE CANNOT BE CERTAIN IF THE REDUCED DISCLOSURE REQUIREMENTS APPLICABLE TO EMERGING GROWTH COMPANIES WILL MAKE OUR COMMON STOCK LESS ATTRACTIVE TO INVESTORS\n\n[FINANCIALS]\nresults of operations, and financial condition.\nMaintaining compliance with THC thresholds and related testing requirements is operationally complex and may be costly.\nOur products are intended to be derived from industrial hemp and to contain no more than 0.3% delta‑9 THC on a dry‑weight basis. However, cannabinoid levels can vary by batch, testing methodologies may differ, and results may depend on sampling and laboratory procedures. If any product or shipment is alleged or determined to exceed applicable THC thresholds or otherwise fail to comply with applicable requirements, we could be subject to product holds, recalls, seizure, destruction, penalties, loss of vendor relationships, and reputational harm, which could materially and adversely affect our business.\nEven if a product is manufactured from hemp that complies with federal law, states and localities maintain their own rules governing hemp-derived CBD products, which may include restrictions on ingestible products, additional registration or licensing requirements, labeling and testing requirements, age restrictions, and limits on the types of marketing claims that may be made. We must evaluate and comply with the unique requirements of each jurisdiction into which we sell or ship products. Failure to comply could result in fines, product seizure, restrictions on sales, or enforcement actions, and compliance costs may be significant.\nRestrictions on payment processing, banking and insurance for CBD companies could impair our operations.\nFinancial institutions, card processors and insurers may decline to provide services to CBD-related businesse function esc(s) {
  if (s == null) return "—";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function collapsible(title, bodyHtml) {
  return '<div class="collapsible"><div class="collapsible-header open" onclick="toggleSection(this)">' + title + '</div><div class="collapsible-body open">' + bodyHtml + '</div></div>';
}

function fmt3y(arr) {
  if (!Array.isArray(arr)) return "—";
  return arr.map(function(v) { return v == null ? "—" : v; }).join(" → ");
}

    var industry = an ? '<span class="tag">' + esc(an.industry || "") + '</span>' : "";
    var underwriters = an && an.investors && an.investors.underwriters && an.investors.underwriters.length
      ? '<span class="tag">承销：' + an.investors.underwriters.map(esc).join(" / ") + '</span>' : "";
    card.innerHTML =
      '<div class="card-title"><span class="symbol">' + esc(ipo.symbol) + '</span>· ' + esc(ipo.company) + '</div>' +
      '<div class="card-meta"><span class="tag exchange">' + esc(ipo.exchange) + '</span> ' +
      esc(ipo.ipo_date) + ' &nbsp;|&nbsp; 发行价 ' + esc(ipo.price_range) + ' · 规模 ' + esc(ipo.deal_size) + ' · 市值 ' + esc(ipo.market_cap) + '</div>' +
      '<div style="margin-top:6px">' + industry + underwriters + '</div>' +
      buildFinancials(ipo) + buildFunding(ipo) + buildSummary(ipo);
    content.appendChild(card);
  });
});

// Local-only generate button
if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
  document.getElementById("gen-btn").style.display = "inline-block";
}

function runGenerate() {
  var btn = document.getElementById("gen-btn");
  var log = document.getElementById("gen-log");
  btn.disabled = true;
  btn.textContent = "⏳ 生成中...";
  log.style.display = "block";
  log.textContent = "正在启动 generate.py...";
  fetch("/run-generate", {method: "POST"})
    .then(function(r) { return r.json(); })
    .then(function() { pollStatus(); })
    .catch(function(e) { log.textContent = "错误: " + e; btn.disabled = false; btn.textContent = "🤖 生成完整版"; });
}

function pollStatus() {
  fetch("/status").then(function(r) { return r.json(); }).then(function(d) {
    var log = document.getElementById("gen-log");
    if (d.log) { log.textContent = d.log; log.scrollTop = log.scrollHeight; }
    if (d.running) {
      setTimeout(pollStatus, 2000);
    } else {
      document.getElementById("gen-btn").textContent = "✅ 完成，刷新中...";
      setTimeout(function() { location.reload(); }, 1500);
    }
  });
}

// Search
document.getElementById("search").addEventListener("input", function() {
  var q = this.value.toLowerCase().trim();
  document.querySelectorAll(".card").forEach(function(card) {
    card.classList.toggle("hidden", q !== "" && !card.textContent.toLowerCase().includes(q));
  });
  document.querySelectorAll(".sidebar-company").forEach(function(a) {
    var text = (a.querySelector(".sym") ? a.querySelector(".sym").textContent : a.textContent).toLowerCase();
    var co = (a.querySelector(".co") ? a.querySelector(".co").textContent : "").toLowerCase();
    a.classList.toggle("hidden", q !== "" && !text.includes(q) && !co.includes(q));
  });
});
</script>
